<html>
<head>
<meta charset="utf-8">
</head>
<body style="display: flex; flex-direction: column; align-items: center;">
<h2>3D Framework Demo</h2>
<p id="status">OpenCV.js is loading...</p>
<input type="file" accept="image/*" id="image_upload">
<img id="base_img" style="max-width: 300px; max-height: 300px; margin-top: 8px;">
<br>
<button id="process">process!</button>
<div id="result" style="position: relative; border: 2px solid #555; width: 400px; height: 400px; overflow: hidden;"></div>

<script type="text/javascript">
    var Module = {
    // https://emscripten.org/docs/api_reference/module.html#Module.onRuntimeInitialized
    onRuntimeInitialized() {
        document.getElementById("status").innerHTML = "OpenCV.js is ready.";
        lib_main();
    }
    };
</script>
<script async src="js/opencv.js" type="text/javascript"></script>
<script src="js/lib.js" type="module"></script>
<script>
document.getElementById("image_upload").addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(ev) {
            document.getElementById("base_img").src = ev.target.result;
        };
        reader.readAsDataURL(file);
    }
});
</script>
</body>
</html>
